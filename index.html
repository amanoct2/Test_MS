<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Basic Computer & MS Paint Test</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
padding:20px;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#0077cc;
margin-bottom:20px;
}

.student-info{
margin-bottom:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.student-info input{
padding:10px;
flex:1;
min-width:200px;
border:1px solid #ccc;
border-radius:5px;
}

#timer{
text-align:center;
font-size:28px;
font-weight:bold;
color:red;
margin:15px 0;
}

.question{
background:#fafafa;
padding:15px;
margin-bottom:15px;
border-left:5px solid #0077cc;
border-radius:5px;
}

.question p{
font-size:18px;
font-weight:bold;
}

.correct{
color:green;
font-weight:bold;
}

.wrong{
color:red;
font-weight:bold;
}

button{
background:#0077cc;
color:white;
padding:10px 18px;
border:none;
border-radius:5px;
cursor:pointer;
margin:10px 5px;
font-size:16px;
transition:0.3s;
}

button:hover{
background:#005fa3;
transform:translateY(-2px);
}

#printBtn{
background:#16a34a;
}

#printBtn:hover{
background:#15803d;
}

#result{
text-align:center;
font-size:24px;
font-weight:bold;
margin-top:20px;
}

#printCard{
display:none;
}

@media print{

body{
background:white;
}

.container{
box-shadow:none;
}

button,
#timer,
.question,
.student-info,
h1,
#result{
display:none;
}

#printCard{
display:block !important;
}

}

</style>
</head>

<body>

<div class="container">

<h1>💻 Basic Computer & MS Paint Test</h1>

<div class="student-info">

<input type="text" id="name" placeholder="Enter Student Name">

<input type="text" id="batch" placeholder="Enter Batch">

<input type="date" id="date">

<input type="time" id="time">

</div>

<div id="timer">Time Left: 20:00</div>

<form id="quizForm"></form>

<div id="result"></div>

<!-- PRINT RESULT CARD -->
<div id="printCard"></div>

<center>

<button type="button" id="submitBtn" onclick="checkAnswers()">
✅ Submit Test
</button>

<button type="button" id="printBtn" onclick="printResult()">
🖨 Print Result
</button>

</center>

</div>

<script>

// QUESTIONS
const questions = [

["What is a computer?","Electronic Machine","Car","Fan","Book"],

["Which shows picture?","Monitor","Mouse","Keyboard","CPU"],

["Which device is used to type?","Mouse","Keyboard","Printer","Speaker"],

["Which device is used to click?","Mouse","Keyboard","Monitor","Printer"],

["Which key gives space?","Enter","Shift","Spacebar","Ctrl"],

["Which key deletes letters?","Backspace","Shift","Alt","Tab"],

["Which key starts new line?","Ctrl","Enter","Shift","Caps Lock"],

["Which software is used for drawing?","Paint","Chrome","Excel","Word"],

["Which tool erases drawing?","Brush","Eraser","Pencil","Text Tool"],

["Which tool fills color?","Fill Tool","Brush","Pencil","Eraser"],

["CPU full form?","Central Processing Unit","Central Print Unit","Computer Power Unit","Control Processing Unit"],

["Which device prints paper?","Printer","Mouse","Monitor","CPU"],

["Which device gives sound?","Speaker","Keyboard","Monitor","Printer"],

["Which key saves file?","Ctrl+S","Ctrl+C","Ctrl+X","Ctrl+V"],

["Which key copies text?","Ctrl+C","Ctrl+X","Ctrl+V","Ctrl+Z"],

["Which key pastes text?","Ctrl+V","Ctrl+X","Ctrl+S","Ctrl+A"],

["Which tool draws freehand?","Pencil","Eraser","Fill","Text"],

["Which tool writes text?","Text Tool","Brush","Magnifier","Pencil"],

["Which opens file?","Open","Save","Print","Exit"],

["Which creates new file?","New","Open","Print","Close"],

["Which tool zooms picture?","Magnifier","Brush","Pencil","Eraser"],

["Father of Computer?","Charles Babbage","Bill Gates","Steve Jobs","Alan Turing"],

["Brain of Computer?","CPU","Monitor","Mouse","Speaker"],

["Which is an input device?","Keyboard","Monitor","Speaker","Printer"],

["Longest key on keyboard?","Spacebar","Enter","Shift","Tab"]

];

// ANSWERS
const answers = [

"A","A","B","A","C",
"A","B","A","B","A",
"A","A","A","A","A",
"A","A","A","A","A",
"A","A","A","A","A"

];

// CREATE QUESTIONS
let form = document.getElementById("quizForm");

for(let i=0; i<questions.length; i++){

let q = questions[i];

form.innerHTML += `

<div class="question">

<p>${i+1}. ${q[0]}</p>

<label>
<input type="radio" name="q${i}" value="A">
${q[1]}
</label>

<br><br>

<label>
<input type="radio" name="q${i}" value="B">
${q[2]}
</label>

<br><br>

<label>
<input type="radio" name="q${i}" value="C">
${q[3]}
</label>

<br><br>

<label>
<input type="radio" name="q${i}" value="D">
${q[4]}
</label>

<p id="a${i}"></p>

</div>

`;

}

// TIMER
let timeLeft = 20 * 60;

let timer = setInterval(function(){

let minutes = Math.floor(timeLeft / 60);

let seconds = timeLeft % 60;

seconds = seconds < 10 ? "0" + seconds : seconds;

document.getElementById("timer").innerHTML =
"Time Left: " + minutes + ":" + seconds;

timeLeft--;

if(timeLeft < 0){

clearInterval(timer);

checkAnswers();

}

},1000);

// CHECK ANSWERS
function checkAnswers(){

clearInterval(timer);

document.getElementById("submitBtn").disabled = true;

let score = 0;

for(let i=0; i<answers.length; i++){

let selected =
document.querySelector(`input[name="q${i}"]:checked`);

let box = document.getElementById("a"+i);

if(selected && selected.value === answers[i]){

score++;

box.innerHTML = "✅ Correct";

box.className = "correct";

}
else{

box.innerHTML = "❌ Wrong / No Answer";

box.className = "wrong";

}

}

// STUDENT DETAILS
let studentName =
document.getElementById("name").value || "Student";

let batch =
document.getElementById("batch").value || "N/A";

// PERCENTAGE
let percentage = ((score / 25) * 100).toFixed(2);

// STATUS
let status = score >= 10 ? "PASS ✅" : "FAIL ❌";

// MESSAGE
let message = "";
let color = "";

if(score >= 22){

message = "🏆 Excellent Work! You are a Computer Champion!";
color = "#16a34a";

}
else if(score >= 18){

message = "🎉 Very Good! Keep Learning & Growing!";
color = "#2563eb";

}
else if(score >= 10){

message = "👍 Good Job! You Passed Successfully!";
color = "#ca8a04";

}
else{

message = "📚 Don't Worry! Practice More & Try Again!";
color = "#dc2626";

}

// NORMAL RESULT
document.getElementById("result").innerHTML =

`
<h2 style="color:${color};">${message}</h2>

<br>

Student Name: <b>${studentName}</b><br>
Batch: <b>${batch}</b><br><br>

Your Score: <b>${score} / 25</b><br>

Percentage: <b>${percentage}%</b><br><br>

Status: <b>${status}</b>
`;

// PRINT CARD
document.getElementById("printCard").innerHTML =

`
<div style="
max-width:700px;
margin:30px auto;
padding:40px;
border-radius:20px;
background:linear-gradient(135deg,#ffffff,#f0f9ff);
box-shadow:0 0 20px rgba(0,0,0,0.2);
border:8px solid ${color};
text-align:center;
font-family:Arial;
">

<h1 style="
font-size:42px;
color:${color};
margin-bottom:10px;
">
🎓 Test Result
</h1>

<h2 style="
font-size:32px;
margin:20px 0;
color:#111827;
">
${studentName}
</h2>

<p style="
font-size:22px;
margin:10px 0;
">
Batch: <b>${batch}</b>
</p>

<p style="
font-size:28px;
margin:20px 0;
color:${color};
font-weight:bold;
">
${message}
</p>

<div style="
font-size:24px;
margin-top:25px;
line-height:1.8;
">

✅ Score: <b>${score} / 25</b><br>

📊 Percentage: <b>${percentage}%</b><br>

🏅 Result: <b>${status}</b>

</div>

<div style="
margin-top:35px;
font-size:18px;
color:#555;
">
Basic Computer & MS Paint Test
</div>

</div>
`;

document.getElementById("printCard").style.display = "block";

}

// PRINT FUNCTION
function printResult(){

if(document.getElementById("printCard").innerHTML === ""){

alert("Please submit the test first!");

return;

}

window.print();

}

</script>

</body>>
